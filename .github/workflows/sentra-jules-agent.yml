name: Sentra Autonomous Agent (Jules)

# Jules is triggered manually via Google Jules interface (jules.google.com)
# This workflow is a status placeholder — no automated action runs on push
on:
  workflow_dispatch:
    inputs:
      task:
        description: "Task description for Jules agent"
        required: true
        type: string

jobs:
  agent-info:
    runs-on: ubuntu-latest
    steps:
      - name: Jules Agent Info
        run: |
          echo "Jules is a manual agent — trigger tasks at https://jules.google.com"
          echo "Task requested: ${{ github.event.inputs.task }}"
          echo "Repo: ${{ github.repository }}"
          echo "Ref: ${{ github.ref }}"
