name: Codex PR Review

# Placeholder workflow — Codex PR review requires OPENAI_API_KEY secret
# and openai/codex-action which is not publicly available.
on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  codex:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: PR Review Info
        run: |
          echo "PR #${{ github.event.pull_request.number }}: ${{ github.event.pull_request.title }}"
          echo "Codex PR review skipped — OPENAI_API_KEY not configured"
