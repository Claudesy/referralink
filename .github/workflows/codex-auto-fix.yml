name: Codex Auto-Fix on CI Failure

# Placeholder workflow — Codex auto-fix requires OPENAI_API_KEY secret
# and openai/codex-action which is not publicly available.
# This workflow monitors CI/CD Pipeline failures for future activation.
on:
  workflow_run:
    workflows: ["CI/CD Pipeline"]
    types: [completed]

permissions:
  contents: read

jobs:
  status:
    runs-on: ubuntu-latest
    steps:
      - name: Report CI conclusion
        run: |
          echo "CI/CD Pipeline concluded with: ${{ github.event.workflow_run.conclusion }}"
          echo "Branch: ${{ github.event.workflow_run.head_branch }}"
          echo "Ref: ${{ github.event.workflow_run.head_sha }}"
          if [[ "${{ github.event.workflow_run.conclusion }}" == "failure" ]]; then
            echo "CI failed — auto-fix skipped (OPENAI_API_KEY not configured)"
          else
            echo "CI passed — no fix needed"
          fi
